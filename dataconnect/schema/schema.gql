type Rol @table {
  rolId: Int! @unique        # Cambiado a Int! para manejar autoincrementable (1, 2, 3...)
  nombre: String!            # "admin", "teacher", "student"
  descripcion: String
}

# 👤 TABLA UNIFICADA: Todos los inicios de sesión e información básica ocurren aquí
type Usuario @table {
  usuarioId: String! @unique 
  rol: Rol!                 
  nombreCompleto: String!
  correo: String! @unique    
  passwordHash: String!      
  telefono: String
  direccion: String
  fechaNacimiento: Date
  activo: Boolean! @default(value: true)
  fechaRegistro: Date! @default(expr: "request.time")
}

# 🎓 Datos exclusivos de Estudiantes (Se complementa con la tabla Usuario)
type Estudiante @table {
  matricula: String! @unique 
  usuario: Usuario! @unique  
}

# 👨‍🏫 Datos exclusivos de Profesores (Se complementa con la tabla Usuario)
type Instructor @table {
  instructorId: Int! @unique
  usuario: Usuario! @unique  
  especialidad: String
}

type Curso @table {
  cursoId: Int! @unique
  nombre: String!
  descripcion: String
  categoria: String
  urlImagen: String
  instructor: Instructor      
  estado: String
}

type Horario @table {
  horarioId: Int! @unique
  curso: Curso!
  fechaInicio: Date!
  fechaFin: Date!
  horaInicio: String!
  horaFin: String!
  cupoMaximo: Int!
  cupoActual: Int! @default(value: 0)
  estado: String
}

type Asistencia @table {
  asistenciaId: Int! @unique
  instructor: Instructor!    
  estudiante: Estudiante!    
  materiaId: Int! 
  fecha: Date! @default(expr: "request.time")
  estadoAsistencia: String!  
  observaciones: String
}

type Inscripcion @table {
  inscripcionId: String! @unique 
  estudiante: Estudiante!    
  horario: Horario!           
  fechaInscripcion: Date! @default(expr: "request.time")
  estadoInscripcion: String!   
  pagoEstado: String           
}

type ReporteEstadistica @table {
  reporteId: Int! @unique
  curso: Curso!
  periodoAnio: String!        
  totalInscritos: Int! @default(value: 0)
  totalBajas: Int! @default(value: 0)
  porcentajeAsistencia: Float! @default(value: 0.0)
  calificacionPromedio: Float  
  ingresosGenerados: Float     
  fechaActualizacion: Date! @default(expr: "request.time")
}