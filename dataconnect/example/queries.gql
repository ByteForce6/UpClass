# ── Mutations de ReporteEstadistica ──────────────────────────────────────────

mutation CreateReporteEstadistica(
  $reporteId: Int!
  $cursoInternalId: UUID!
  $periodoAnio: String!
  $totalInscritos: Int!
  $totalBajas: Int!
  $porcentajeAsistencia: Float!
  $calificacionPromedio: Float
  $ingresosGenerados: Float
) @auth(level: PUBLIC) {
  reporteEstadistica_insert(data: {
    reporteId: $reporteId
    curso: { id: $cursoInternalId }
    periodoAnio: $periodoAnio
    totalInscritos: $totalInscritos
    totalBajas: $totalBajas
    porcentajeAsistencia: $porcentajeAsistencia
    calificacionPromedio: $calificacionPromedio
    ingresosGenerados: $ingresosGenerados
  })
}

mutation UpdateReporteEstadistica(
  $reporteInternalId: UUID!
  $totalInscritos: Int!
  $totalBajas: Int!
  $porcentajeAsistencia: Float!
  $calificacionPromedio: Float
  $ingresosGenerados: Float
) @auth(level: PUBLIC) {
  reporteEstadistica_update(
    key: { id: $reporteInternalId }
    data: {
      totalInscritos: $totalInscritos
      totalBajas: $totalBajas
      porcentajeAsistencia: $porcentajeAsistencia
      calificacionPromedio: $calificacionPromedio
      ingresosGenerados: $ingresosGenerados
    }
  )
}