#1. QUERY DE LOGIN: Pública para verificar credenciales
query GetUsuarioByCorreo($correo: String!) @auth(level: PUBLIC) {
  usuarios(where: { correo: { eq: $correo } }) {
    usuarioId
    nombreCompleto
    correo
    passwordHash
    rol {
      nombre
    }
  }
}

# ====================================================
# OPERACIONES DE ESTUDIANTES
# ====================================================

query ListarEstudiantes @auth(level: PUBLIC) {
  estudiantes {
    id
    matricula
    usuario {
      id
      usuarioId
      nombreCompleto
      correo
      telefono
      activo
    }
  }
}

mutation CrearEstudiante(
  $usuarioInternalId: UUID!
  $usuarioId: String!
  $rolInternalId: UUID!
  $nombreCompleto: String!
  $correo: String!
  $passwordHash: String!
  $telefono: String!
  $matricula: String!
) @auth(level: PUBLIC) {
  usuario_insert(
    data: {
      id: $usuarioInternalId
      usuarioId: $usuarioId
      rolId: $rolInternalId
      nombreCompleto: $nombreCompleto
      correo: $correo
      passwordHash: $passwordHash
      telefono: $telefono
      activo: true
    }
  )
  estudiante_insert(
    data: {
      matricula: $matricula
      usuarioId: $usuarioInternalId
    }
  )
}

mutation ActualizarEstudiante(
  $usuarioInternalId: UUID!
  $nombreCompleto: String!
  $correo: String!
  $telefono: String!
  $activo: Boolean!
) @auth(level: PUBLIC) {
  usuario_update(
    key: { id: $usuarioInternalId }
    data: {
      nombreCompleto: $nombreCompleto
      correo: $correo
      telefono: $telefono
      activo: $activo
    }
  )
}

mutation ActualizarEstudianteSinCorreo(
  $usuarioInternalId: UUID!
  $nombreCompleto: String!
  $telefono: String!
  $activo: Boolean!
) @auth(level: PUBLIC) {
  usuario_update(
    key: { id: $usuarioInternalId }
    data: {
      nombreCompleto: $nombreCompleto
      telefono: $telefono
      activo: $activo
    }
  )
}

mutation ActualizarPasswordUsuario(
  $usuarioInternalId: UUID!
  $passwordHash: String!
) @auth(level: PUBLIC) {
  usuario_update(
    key: { id: $usuarioInternalId }
    data: {
      passwordHash: $passwordHash
    }
  )
}


mutation EliminarEstudiante(
  # ¡Aquí no declaraste $estudianteInternalId! Solo tienes esta variable:
  $usuarioInternalId: UUID!
) @auth(level: PUBLIC) {
  usuario_delete(key: { id: $usuarioInternalId })
}

# ====================================================
# OPERACIONES DE INSTRUCTORES
# ====================================================

query ListInstructors @auth(level: PUBLIC) {
  instructors {
    id
    instructorId
    usuarioId
    especialidad
    usuario {
      id
      usuarioId
      nombreCompleto
      correo
      telefono
      activo
    }
  }
}

query GetRolByNumero($rolId: Int!) @auth(level: PUBLIC) {
  rols(where: { rolId: { eq: $rolId } }) {
    id
    rolId
    nombre
  }
}

mutation CreateInstructor(
  $usuarioInternalId: UUID!
  $usuarioId: String!
  $rolInternalId: UUID!
  $nombreCompleto: String!
  $correo: String!
  $passwordHash: String!
  $telefono: String!
  $especialidad: String!
  $instructorId: Int!
) @auth(level: PUBLIC) {
  usuario_insert(
    data: {
      id: $usuarioInternalId
      usuarioId: $usuarioId
      rolId: $rolInternalId
      nombreCompleto: $nombreCompleto
      correo: $correo
      passwordHash: $passwordHash
      telefono: $telefono
      activo: true
    }
  )
  instructor_insert(
    data: {
      usuarioId: $usuarioInternalId
      instructorId: $instructorId
      especialidad: $especialidad
    }
  )
}

mutation UpdateInstructor(
  $usuarioInternalId: UUID!
  $instructorInternalId: UUID!
  $nombreCompleto: String!
  $correo: String!
  $telefono: String!
  $activo: Boolean!
  $especialidad: String!
) @auth(level: PUBLIC) {
  usuario_update(
    key: { id: $usuarioInternalId }
    data: {
      nombreCompleto: $nombreCompleto
      correo: $correo
      telefono: $telefono
      activo: $activo
    }
  )
  instructor_update(
    key: { id: $instructorInternalId }
    data: { especialidad: $especialidad }
  )
}

mutation DeleteInstructor(
  $instructorInternalId: UUID!
  $usuarioInternalId: UUID!
) @auth(level: PUBLIC) {
  instructor_delete(key: { id: $instructorInternalId })
  usuario_delete(key: { id: $usuarioInternalId })
}

# ====================================================
# CURSOS
# ====================================================

query ListCursos @auth(level: PUBLIC) {
  cursos {
    id
    cursoId
    nombre
    descripcion
    categoria
    urlImagen
    estado
    instructor {
      instructorId
      usuario {
        nombreCompleto
      }
    }
  }
}

query BuscarCursoPorNombre($nombre: String!) @auth(level: PUBLIC) {
  cursos(where: { nombre: { contains: $nombre } }) {
    id
    cursoId
    nombre
    categoria
    estado
    instructor {
      usuario {
        nombreCompleto
      }
    }
  }
}

query CursosPorCategoria($categoria: String!) @auth(level: PUBLIC) {
  cursos(where: { categoria: { eq: $categoria } }) {
    id
    cursoId
    nombre
    categoria
    estado
  }
}

query CursosPorEstado($estado: String!) @auth(level: PUBLIC) {
  cursos(where: { estado: { eq: $estado } }) {
    id
    nombre
    estado
  }
}

mutation CreateCurso(
  $cursoId: Int!
  $nombre: String!
  $descripcion: String
  $categoria: String
  $urlImagen: String
  $estado: String
  $instructorId: UUID
) @auth(level: PUBLIC) {
  curso_insert(
    data: {
      cursoId: $cursoId
      nombre: $nombre
      descripcion: $descripcion
      categoria: $categoria
      urlImagen: $urlImagen
      estado: $estado
      instructor: { id: $instructorId }
    }
  )
}

mutation UpdateCurso(
  $cursoInternalId: UUID!
  $cursoId: Int!
  $nombre: String!
  $descripcion: String
  $categoria: String
  $urlImagen: String
  $estado: String
  $instructorId: UUID
) @auth(level: PUBLIC) {
  curso_update(
    key: { id: $cursoInternalId }
    data: {
      cursoId: $cursoId
      nombre: $nombre
      descripcion: $descripcion
      categoria: $categoria
      urlImagen: $urlImagen
      estado: $estado
      instructor: { id: $instructorId }
    }
  )
}

mutation DeleteCurso($cursoInternalId: UUID!) @auth(level: PUBLIC) {
  curso_delete(key: { id: $cursoInternalId })
}
