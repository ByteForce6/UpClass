#1. QUERY DE LOGIN: Pública para verificar credenciales
query GetUsuarioByCorreo($correo: String!) @auth(level: PUBLIC) {
  usuarios(where: { correo: { eq: $correo } }) {
    usuarioId  
    nombreCompleto
    correo
    passwordHash
    rol {
      nombre
    }
  }
}

# 2. BUSCAR ESTUDIANTE POR MATRÍCULA
query BuscarEstudiantePorMatricula($matricula: String!) @auth(level: USER) {
  estudiantes(where: { matricula: { eq: $matricula } }) {
    matricula
    usuario {  # 👈 Entramos a la relación para sacar los datos reales
      usuarioId
      nombreCompleto
      correo
      activo
    }
  }
}

# 3. BUSCAR ESTUDIANTE POR NOMBRE
query BuscarEstudiantePorNombre($nombre: String!) @auth(level: USER) {
  estudiantes(
    where: {
      usuario: { nombreCompleto: { contains: $nombre } } # 👈 El filtro correcto se aplica en el usuario
    }
  ) {
    matricula
    usuario {
      nombreCompleto
      correo
    }
  }
}

# 4. LISTAR TODOS LOS ESTUDIANTES
query ListarEstudiantes @auth(level: USER) {
  estudiantes {
    matricula
    usuario {
      nombreCompleto
      correo
      activo
    }
  }
}

# ====================================================
# OPERACIONES DE INSTRUCTORES
# ====================================================

query ListInstructors @auth(level: PUBLIC) {
  instructors {
    id
    instructorId
    usuarioId
    especialidad
    usuario {
      id
      usuarioId
      nombreCompleto
      correo
      telefono
      activo
    }
  }
}

query GetRolByNumero($rolId: Int!) @auth(level: PUBLIC) {
  rols(where: { rolId: { eq: $rolId } }) {
    id
    rolId
    nombre
  }
}

mutation CreateInstructor(
  $usuarioInternalId: UUID!,
  $usuarioId: String!,
  $rolInternalId: UUID!,
  $nombreCompleto: String!,
  $correo: String!,
  $passwordHash: String!,
  $telefono: String!,
  $especialidad: String!,
  $instructorId: Int!
) @auth(level: PUBLIC) {
  usuario_insert(data: {
    id: $usuarioInternalId,
    usuarioId: $usuarioId,
    rolId: $rolInternalId,
    nombreCompleto: $nombreCompleto,
    correo: $correo,
    passwordHash: $passwordHash,
    telefono: $telefono,
    activo: true
  })

  instructor_insert(data: {
    usuarioId: $usuarioInternalId,
    instructorId: $instructorId,
    especialidad: $especialidad
  })
}

mutation UpdateInstructor(
  $usuarioInternalId: UUID!,
  $instructorInternalId: UUID!,
  $nombreCompleto: String!,
  $correo: String!,
  $telefono: String!,
  $activo: Boolean!,
  $especialidad: String!
) @auth(level: PUBLIC) {
  usuario_update(
    key: { id: $usuarioInternalId },
    data: {
      nombreCompleto: $nombreCompleto,
      correo: $correo,
      telefono: $telefono,
      activo: $activo
    }
  )

  instructor_update(
    key: { id: $instructorInternalId },
    data: {
      especialidad: $especialidad
    }
  )
}

mutation DeleteInstructor(
  $instructorInternalId: UUID!,
  $usuarioInternalId: UUID!
) @auth(level: PUBLIC) {
  instructor_delete(key: { id: $instructorInternalId })
  usuario_delete(key: { id: $usuarioInternalId })
}