# тФАтФА Cursos тФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФА

# Lista todos los cursos con su instructor para las gr├бficas de estad├нsticas
query ListCursosEstadisticas {
  cursos {
    cursoId
    nombre
    descripcion
    categoria
    estado
    instructor {
      instructorId
      especialidad
      usuario {
        nombreCompleto
      }
    }
  }
}

# тФАтФА Horarios тФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФА

# Lista todos los horarios con cupo y estado
query ListHorarios {
  horarios {
    horarioId
    fechaInicio
    fechaFin
    horaInicio
    horaFin
    cupoMaximo
    cupoActual
    estado
    curso {
      cursoId
      nombre
      categoria
    }
  }
}

# Horarios de hoy (filtra por fecha en el cliente, Data Connect no soporta
# comparaci├│n de fechas directamente en el WHERE sin extensiones)
query ListHorariosPorEstado($estado: String!) {
  horarios(where: { estado: { eq: $estado } }) {
    horarioId
    fechaInicio
    fechaFin
    horaInicio
    horaFin
    cupoMaximo
    cupoActual
    estado
    curso {
      cursoId
      nombre
      categoria
      instructor {
        usuario {
          nombreCompleto
        }
      }
    }
  }
}

# тФАтФА Inscripciones тФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФА

# Todas las inscripciones para calcular totales por curso
query ListInscripciones {
  inscripcions {
    inscripcionId
    fechaInscripcion
    estadoInscripcion
    pagoEstado
    estudiante {
      matricula
      usuario {
        nombreCompleto
        correo
      }
    }
    horario {
      horarioId
      curso {
        cursoId
        nombre
        categoria
      }
    }
  }
}

# Inscripciones filtradas por estado (activa / baja / pendiente)
query ListInscripcionesPorEstado($estado: String!) {
  inscripcions(where: { estadoInscripcion: { eq: $estado } }) {
    inscripcionId
    fechaInscripcion
    estadoInscripcion
    pagoEstado
    estudiante {
      matricula
      usuario {
        nombreCompleto
      }
    }
    horario {
      horarioId
      curso {
        cursoId
        nombre
        categoria
      }
    }
  }
}

# тФАтФА Asistencias тФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФА

# Todas las asistencias para calcular porcentajes por curso
query ListAsistencias {
  asistencias {
    asistenciaId
    fecha
    estadoAsistencia
    observaciones
    estudiante {
      matricula
      usuario {
        nombreCompleto
      }
    }
    instructor {
      instructorId
      usuario {
        nombreCompleto
      }
    }
    materiaId
  }
}

# Asistencias filtradas por estado (presente / ausente / justificado)
query ListAsistenciasPorEstado($estado: String!) {
  asistencias(where: { estadoAsistencia: { eq: $estado } }) {
    asistenciaId
    fecha
    estadoAsistencia
    materiaId
    estudiante {
      matricula
      usuario {
        nombreCompleto
      }
    }
  }
}

# тФАтФА Reportes de estad├нstica тФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФА

# Todos los reportes para la tabla y gr├бficas de reportes
query ListReportesEstadisticas {
  reporteEstadisticas {
    reporteId
    periodoAnio
    totalInscritos
    totalBajas
    porcentajeAsistencia
    calificacionPromedio
    ingresosGenerados
    fechaActualizacion
    curso {
      cursoId
      nombre
      categoria
    }
  }
}

# Reportes filtrados por periodo (ej: "2026-Q1", "2026-Q2")
query ListReportesPorPeriodo($periodo: String!) {
  reporteEstadisticas(where: { periodoAnio: { eq: $periodo } }) {
    reporteId
    periodoAnio
    totalInscritos
    totalBajas
    porcentajeAsistencia
    calificacionPromedio
    ingresosGenerados
    fechaActualizacion
    curso {
      cursoId
      nombre
      categoria
    }
  }
}

# Reporte de un curso espec├нfico
query ListReportesPorCurso($cursoId: Int!) {
  reporteEstadisticas(where: { curso: { cursoId: { eq: $cursoId } } }) {
    reporteId
    periodoAnio
    totalInscritos
    totalBajas
    porcentajeAsistencia
    calificacionPromedio
    ingresosGenerados
    fechaActualizacion
    curso {
      cursoId
      nombre
      categoria
    }
  }
}


# тФАтФА Mutations de ReporteEstadistica тФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФА

# Crea o actualiza manualmente un reporte de estad├нstica
mutation UpsertReporteEstadistica(
  $cursoId: Int!
  $periodoAnio: String!
  $totalInscritos: Int!
  $totalBajas: Int!
  $porcentajeAsistencia: Float!
  $calificacionPromedio: Float
  $ingresosGenerados: Float
) {
  reporteEstadistica_insert(data: {
    curso: { id: $cursoId }
    periodoAnio: $periodoAnio
    totalInscritos: $totalInscritos
    totalBajas: $totalBajas
    porcentajeAsistencia: $porcentajeAsistencia
    calificacionPromedio: $calificacionPromedio
    ingresosGenerados: $ingresosGenerados
  })
}
